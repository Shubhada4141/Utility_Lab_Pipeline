name: UtilityHub CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Docker Version
        run: docker --version

      - name: Build Docker Image
        run: docker build -t utilityhub .

      - name: Run the container 
        run: docker run -d -p 8000:8080 --name app-container utilityhub

      - name: cheaking for running container 
        run: docker ps  

        



      
      
      
      
